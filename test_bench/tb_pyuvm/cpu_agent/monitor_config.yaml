# monitor_config.yaml - Configuration for DHRUT-V CPU Pipeline Monitor Display
# This YAML file defines all pipeline stages, their signals, and display formats
# It works with the dynamic CpuMonitor that reads this config at runtime

stages:
  # ─────────────────────────────────────────────────────────────────────────
  # FETCH Stage - Instruction Fetch from Memory
  # ─────────────────────────────────────────────────────────────────────────
  FETCH:
    display_name: "FETCH"
    description: "Instruction Fetch stage - retrieves instructions from memory"
    signals:
      # Valid signal from IF/ID pipeline register
      - name: "valid"
        signal_path: "if_id_valid"
        format: "{:1d}"
        type: "bool"
        description: "Instruction valid"
      
      # Program Counter
      - name: "PC"
        signal_path: "if_id_pc"
        format: "0x{:08x}"
        type: "int"
        description: "Program Counter"
      
      # Instruction encoding (32-bit RISC-V)
      - name: "instr"
        signal_path: "if_id_instr"
        format: "0x{:08x}"
        type: "int"
        description: "Raw instruction bits"
      
      # Stall signal from decode stage
      - name: "stall_IF"
        signal_path: "decode_to_fetch_stall"
        format: "{:1d}"
        type: "bool"
        description: "Stall signal to IF stage"

  # ─────────────────────────────────────────────────────────────────────────
  # DECODE Stage - Instruction Decoding and UOP Generation
  # ───────────────────────────────────────────────────────────────────────────
  DECODE:
    display_name: "DECODE"
    description: "Instruction Decode stage - translates instructions to microops"
    signals:
      # Valid micro-operation signal
      - name: "valid"
        signal_path: "id_issue_valid"
        format: "{:1d}"
        type: "bool"
        description: "UOP valid"
      
      # Program Counter passed through decode
      - name: "PC"
        signal_path: "id_issue_pc"
        format: "0x{:08x}"
        type: "int"
        description: "PC of decoded instruction"
      
      # UOP opcode/operation type - EXTRACTED from packed id_issue_uop
      - name: "opcode"
        signal_path: "uop_opcode"
        format: "0x{:02x}"
        type: "int"
        description: "UOP opcode (7 bits) - extracted from id_issue_uop"
        source: "uop_extraction"
      
      # Destination register - EXTRACTED from packed id_issue_uop
      - name: "rd"
        signal_path: "uop_rd"
        format: "x{:02d}"
        type: "int"
        description: "Destination register - extracted from id_issue_uop"
        source: "uop_extraction"
      
      # Source register 1 - EXTRACTED from packed id_issue_uop
      - name: "rs1"
        signal_path: "uop_rs1"
        format: "x{:02d}"
        type: "int"
        description: "Source register 1 - extracted from id_issue_uop"
        source: "uop_extraction"
      
      # Source register 2 - EXTRACTED from packed id_issue_uop
      - name: "rs2"
        signal_path: "uop_rs2"
        format: "x{:02d}"
        type: "int"
        description: "Source register 2 - extracted from id_issue_uop"
        source: "uop_extraction"
      
      # Register write enable - EXTRACTED from packed id_issue_uop
      - name: "wr"
        signal_path: "uop_writes_rd"
        format: "{:1d}"
        type: "bool"
        description: "Writes destination register - extracted from id_issue_uop"
        source: "uop_extraction"
      
      # Immediate value - EXTRACTED from packed id_issue_uop
      - name: "imm"
        signal_path: "uop_imm"
        format: "{:#x}"
        type: "int"
        description: "Sign-extended immediate - extracted from id_issue_uop"
        source: "uop_extraction"

      # Load signal - EXTRACTED from packed id_issue_uop
      - name: "load"
        signal_path: "uop_is_load"
        format: "{:1d}"
        type: "bool"
        description: "Is load instruction - extracted from id_issue_uop"
        source: "uop_extraction"

      # Store signal - EXTRACTED from packed id_issue_uop
      - name: "store"
        signal_path: "uop_is_store"
        format: "{:1d}"
        type: "bool"
        description: "Is store instruction - extracted from id_issue_uop"
        source: "uop_extraction"

  # ─────────────────────────────────────────────────────────────────────────
  # ISSUE Stage - Instruction Scheduling and Register File Access
  # ─────────────────────────────────────────────────────────────────────────
  ISSUE:
    display_name: "ISSUE"
    description: "Issue stage - schedules UOPs and accesses register file"
    signals:
      # Valid micro-operation in issue buffer
      - name: "valid"
        signal_path: "ISSUE.buf_valid_q"
        format: "{:1d}"
        type: "bool"
        description: "UOP in issue buffer is valid"

      # Program Counter in issue buffer
      - name: "PC"
        signal_path: "ISSUE.buf_pc_q"
        format: "0x{:08x}"
        type: "int"
        description: "PC of instruction in issue buffer"

      # Opcode in issue buffer
      - name: "opcode"
        signal_path: "uop_iss_opcode"
        format: "0x{:02x}"
        type: "int"
        description: "Opcode of instruction in issue buffer"
        source: "uop_issue_extraction"

      # Dispatch destination
      - name: "to_ALU"
        signal_path: "alu_if.m_valid"
        format: "{:1d}"
        type: "bool"
        description: "Issued to ALU"
      
      - name: "to_LSU"
        signal_path: "lsu_if.m_valid"
        format: "{:1d}"
        type: "bool"
        description: "Issued to LSU"

      # Branch/Jump resolution
      - name: "br_taken"
        signal_path: "ISSUE.o_branch_taken"
        format: "{:1d}"
        type: "bool"
        description: "Branch/Jump decision"

      # Branch/Jump target
      - name: "br_target"
        signal_path: "ISSUE.o_branch_target"
        format: "0x{:08x}"
        type: "int"
        description: "Branch/Jump target address"
      
      # ALU operands (from ISSUE stage perspectives)
      - name: "op1"
        signal_path: "ISSUE.op1"
        format: "0x{:08x}"
        type: "int"
        description: "Resolved operand 1 (with forwarding)"
      
      - name: "op2"
        signal_path: "ISSUE.op2"
        format: "0x{:08x}"
        type: "int"
        description: "Resolved operand 2 (with forwarding)"

      # Stall signal to decode
      - name: "stall_ID"
        signal_path: "issue_to_decode_stall"
        format: "{:1d}"
        type: "bool"
        description: "Stall signal back to decode stage"

  # ─────────────────────────────────────────────────────────────────────────
  # ALU Stage - Arithmetic/Logic Execution
  # ─────────────────────────────────────────────────────────────────────────
  ALU:
    display_name: "ALU"
    description: "ALU execution stage - performs arithmetic and logic operations"
    signals:
      # Valid micro-operation signal
      - name: "valid"
        signal_path: "ALU.valid_q"
        format: "{:1d}"
        type: "bool"
        description: "ALU operation in progress"

      # Program Counter
      - name: "PC"
        signal_path: "ALU.pc_q"
        format: "0x{:08x}"
        type: "int"
        description: "PC of instruction in ALU"

      # ALU opcode
      - name: "opcode"
        signal_path: "uop_alu_opcode"
        format: "0x{:02x}"
        type: "int"
        description: "UOP opcode in ALU"
        source: "uop_alu_extraction"

      # ALU operand 1
      - name: "op1"
        signal_path: "ALU.op1_q"
        format: "0x{:08x}"
        type: "int"
        description: "ALU operand 1"

      # ALU operand 2
      - name: "op2"
        signal_path: "ALU.op2_q"
        format: "0x{:08x}"
        type: "int"
        description: "ALU operand 2"

      # ALU result value
      - name: "result"
        signal_path: "ALU.alu_result"
        format: "0x{:08x}"
        type: "int"
        description: "ALU result value"

  # ─────────────────────────────────────────────────────────────────────────
  # LSU Stage - Load/Store Execution
  # ─────────────────────────────────────────────────────────────────────────
  LSU:
    display_name: "LSU"
    description: "Load/Store Unit - handles memory access, forwards loads, signals stalls"
    signals:
      # LSU retire valid
      - name: "valid"
        signal_path: "LSU.valid_q"
        format: "{:1d}"
        type: "bool"
        description: "LSU operation in progress"

      # Instruction PC in LSU
      - name: "PC"
        signal_path: "LSU.pc_q"
        format: "0x{:08x}"
        type: "int"
        description: "PC of instruction in LSU"

      # Is load instruction
      - name: "load"
        signal_path: "uop_lsu_is_load"
        format: "{:1d}"
        type: "bool"
        description: "Instruction is a load"
        source: "uop_lsu_extraction"

      # Is store instruction
      - name: "store"
        signal_path: "uop_lsu_is_store"
        format: "{:1d}"
        type: "bool"
        description: "Instruction is a store"
        source: "uop_lsu_extraction"

      # Computed memory address
      - name: "addr"
        signal_path: "LSU.mem_addr"
        format: "0x{:08x}"
        type: "int"
        description: "Final memory address"

      # Store data (if store)
      - name: "sdata"
        signal_path: "LSU.store_data_q"
        format: "0x{:08x}"
        type: "int"
        description: "Store data"

      # Load result data
      - name: "ldata"
        signal_path: "LSU.o_load_data"
        format: "0x{:08x}"
        type: "int"
        description: "Processed load data"

      # Stall from LSU
      - name: "stall"
        signal_path: "lsu_if.s_stall_from_lsu"
        format: "{:1d}"
        type: "bool"
        description: "Stall signal to pipeline from LSU"

  # ─────────────────────────────────────────────────────────────────────────
  # RETIRE Stage - Writeback to Register File and Commit
  # ─────────────────────────────────────────────────────────────────────────
  RETIRE:
    display_name: "RETIRE"
    description: "Retire stage - commits results to register file"
    signals:
      # Register file write enable
      - name: "wb_en"
        signal_path: "retire_wb_en"
        format: "{:1d}"
        type: "bool"
        description: "Write-back enabled"
      
      # Destination register (write-back)
      - name: "wb_rd"
        signal_path: "retire_wb_rd"
        format: "x{:02d}"
        type: "int"
        description: "Write-back register"
      
      # Write-back data
      - name: "wb_data"
        signal_path: "retire_wb_data"
        format: "0x{:08x}"
        type: "int"
        description: "Write-back data value"

# ───────────────────────────────────────────────────────────────────────────
# Optional: Define which stages to display (subset of available stages)
# ───────────────────────────────────────────────────────────────────────────
display_stages: ["FETCH", "DECODE", "ISSUE", "ALU", "LSU", "RETIRE"]

# ───────────────────────────────────────────────────────────────────────────
# UOP Bit Extraction Configuration (For 79-bit uop_t)
# ───────────────────────────────────────────────────────────────────────────
uop_extraction:
  signal_path: "id_issue_uop"
  fields:
    - name: "uop_valid"
      bits: [78, 78]
    - name: "uop_opcode"
      bits: [77, 71]
    - name: "uop_alu_op"
      bits: [70, 61]
    - name: "uop_rs1"
      bits: [60, 56]
    - name: "uop_rs2"
      bits: [55, 51]
    - name: "uop_rd"
      bits: [50, 46]
    - name: "uop_funct3"
      bits: [45, 43]
    - name: "uop_imm"
      bits: [42, 11]
    - name: "uop_uses_rs1"
      bits: [10, 10]
    - name: "uop_uses_rs2"
      bits: [9, 9]
    - name: "uop_writes_rd"
      bits: [8, 8]
    - name: "uop_is_immediate"
      bits: [7, 7]
    - name: "uop_is_branch"
      bits: [6, 6]
    - name: "uop_is_jump"
      bits: [5, 5]
    - name: "uop_is_load"
      bits: [4, 4]
    - name: "uop_is_store"
      bits: [3, 3]

uop_issue_extraction:
  signal_path: "ISSUE.buf_uop_q"
  fields:
    - name: "uop_iss_opcode"
      bits: [77, 71]
    - name: "uop_iss_is_branch"
      bits: [6, 6]
    - name: "uop_iss_is_jump"
      bits: [5, 5]

uop_alu_extraction:
  signal_path: "ALU.uop_q"
  fields:
    - name: "uop_alu_opcode"
      bits: [77, 71]

uop_lsu_extraction:
  signal_path: "LSU.uop_q"
  fields:
    - name: "uop_lsu_is_load"
      bits: [4, 4]
    - name: "uop_lsu_is_store"
      bits: [3, 3]

# ───────────────────────────────────────────────────────────────────────────
# Display Configuration
# ───────────────────────────────────────────────────────────────────────────
display_config:
  log_level: "INFO"
  print_full_items: true
  print_only_valid: false
  timestamp_unit: "ns"
  use_colors: true
